name: CD

on:
  push:
    branches: [main]

env:
  REGION:     europe-west2
  PROJECT_ID: churn-propensity-model
  REGISTRY:   europe-west2-docker.pkg.dev
  IMAGE:      europe-west2-docker.pkg.dev/churn-propensity-model/churn-api/churn-propensity

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP using service account key stored in GitHub secrets
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker to push to GCP Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Build and tag with git SHA for traceability
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} \
                       -t ${{ env.IMAGE }}:latest .

      # Push both tags — SHA for history, latest for Cloud Run to pull
      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # Deploy the new image to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy churn-api \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --port 8080 \
            --allow-unauthenticated \
            --quiet

      # Print the live URL so it's visible in the Actions log
      - name: Show service URL
        run: |
          gcloud run services describe churn-api \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
